<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>豆腐 採寸ツール</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.136/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.136/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    html, body, #cesiumContainer { width:100%; height:100%; margin:0; padding:0; overflow:hidden; }
    body { font-family:-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif; }
    #ui { position:absolute; top:10px; left:10px; z-index:10; background:rgba(17,24,28,.88);
      color:#eef1f2; padding:12px 13px; border-radius:10px; width:248px; line-height:1.5;
      box-shadow:0 4px 18px rgba(0,0,0,.4); }
    #ui h1 { font-size:14px; margin:0 0 6px; }
    #ui ol { margin:0 0 8px; padding-left:18px; font-size:11.5px; color:#aeb8bd; }
    #ui ol li { margin-bottom:2px; }
    .btn { display:block; width:100%; box-sizing:border-box; margin:5px 0; padding:9px 0;
      font-size:12.5px; font-weight:600; border:none; border-radius:7px; cursor:pointer;
      color:#11181c; background:#9aa6ac; }
    .btn.active { background:#5fd0c4; box-shadow:0 0 0 2px #fff inset; }
    .btn.green  { background:#5fb98a; }
    .btn.gray   { background:#6b7780; color:#fff; }
    #readout { margin-top:8px; font-size:11.5px; color:#dfe6e9; }
    #readout b { color:#5fd0c4; }
    #json { width:100%; box-sizing:border-box; height:74px; margin-top:6px; font-size:10px;
      background:#0d1316; color:#9fb4bd; border:1px solid #2a3940; border-radius:6px; padding:6px; }
    #warn { position:absolute; inset:0; z-index:50; display:none; align-items:center;
      justify-content:center; background:#11181c; color:#f3f5f6; text-align:center; padding:24px; }
    #warn div { max-width:360px; font-size:14px; line-height:1.7; }
    #warn code { background:#222e34; padding:1px 6px; border-radius:4px; }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <div id="ui">
    <h1>豆腐 採寸ツール</h1>
    <ol>
      <li>「輪郭をなぞる」を押し、建物の足元の角を順にクリック（3点以上）</li>
      <li>「高さを取得」を押し、屋根のてっぺんをクリック</li>
      <li>「箱を表示」で豆腐に重なるか確認。ズレたらやり直す</li>
    </ol>
    <button class="btn" id="bOutline">① 輪郭をなぞる</button>
    <button class="btn" id="bHeight">② 高さを取得</button>
    <button class="btn green" id="bBox">③ 箱を表示</button>
    <button class="btn gray" id="bReset">やり直す</button>
    <button class="btn gray" id="bFly">常楽園に戻る</button>
    <div id="readout">点：0／高さ：未取得</div>
    <textarea id="json" readonly placeholder="採寸結果（これをコピーして貼ってくれれば、この寸法で箱にテクスチャを貼った版を作ります）"></textarea>
  </div>
  <div id="warn"><div>
    Cesium ion のアクセストークンが未設定です。<br>
    このHTMLの <code>YOUR_CESIUM_ION_TOKEN</code> を、取得したトークンに書き換えてください。
  </div></div>

  <script type="module">
    const TOKEN = "YOUR_CESIUM_ION_TOKEN";
    const STORE = { lon: 138.237502, lat: 34.747161 };
    const JAPAN_3D_BUILDINGS_ASSET_ID = 2602291;

    if (!TOKEN || TOKEN === "YOUR_CESIUM_ION_TOKEN") {
      document.getElementById("warn").style.display = "flex";
    } else {
      Cesium.Ion.defaultAccessToken = TOKEN;
      const viewer = new Cesium.Viewer("cesiumContainer", {
        terrain: Cesium.Terrain.fromWorldTerrain(),
        timeline:false, animation:false, geocoder:false, homeButton:false,
        sceneModePicker:false, navigationHelpButton:false, baseLayerPicker:false,
        infoBox:false, selectionIndicator:false
      });
      viewer.scene.globe.depthTestAgainstTerrain = true;

      let groundZ = 0;
      (async () => {
        const tileset = await Cesium.Cesium3DTileset.fromIonAssetId(JAPAN_3D_BUILDINGS_ASSET_ID);
        viewer.scene.primitives.add(tileset);
        const [g] = await Cesium.sampleTerrainMostDetailed(
          viewer.terrainProvider, [Cesium.Cartographic.fromDegrees(STORE.lon, STORE.lat)]);
        groundZ = g.height;
        flyToStore();
      })();

      let mode = null;            // 'outline' | 'height' | null
      let corners = [];           // {lon,lat,height}
      let baseZ = null, roofZ = null, boxEntity = null;
      const cornerEnts = [];

      // 進行中の輪郭ライン
      viewer.entities.add({
        polyline: {
          positions: new Cesium.CallbackProperty(() =>
            corners.map(c => Cesium.Cartesian3.fromDegrees(c.lon, c.lat, c.height)), false),
          width: 3, material: Cesium.Color.CYAN
        }
      });

      const bOutline = document.getElementById("bOutline");
      const bHeight  = document.getElementById("bHeight");
      function setMode(m) {
        mode = (mode === m) ? null : m;
        bOutline.classList.toggle("active", mode === "outline");
        bHeight.classList.toggle("active", mode === "height");
      }
      bOutline.onclick = () => setMode("outline");
      bHeight.onclick  = () => setMode("height");

      const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
      handler.setInputAction((click) => {
        if (!mode) return;
        const cart = viewer.scene.pickPosition(click.position);
        if (!Cesium.defined(cart)) return;
        const carto = Cesium.Cartographic.fromCartesian(cart);
        const lon = Cesium.Math.toDegrees(carto.longitude);
        const lat = Cesium.Math.toDegrees(carto.latitude);
        const h = carto.height;

        if (mode === "outline") {
          corners.push({ lon, lat, height: h });
          baseZ = (baseZ === null) ? h : Math.min(baseZ, h);
          cornerEnts.push(viewer.entities.add({
            position: Cesium.Cartesian3.fromDegrees(lon, lat, h),
            point: { pixelSize: 9, color: Cesium.Color.CYAN, outlineColor: Cesium.Color.WHITE,
                     outlineWidth: 2, disableDepthTestDistance: Number.POSITIVE_INFINITY }
          }));
        } else if (mode === "height") {
          roofZ = h;
        }
        updateReadout();
      }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

      function updateReadout() {
        const ro = document.getElementById("readout");
        const hgt = (roofZ !== null && baseZ !== null) ? (roofZ - baseZ).toFixed(1) + " m" : "未取得";
        let dims = "";
        if (corners.length >= 2) {
          const lons = corners.map(c => c.lon), lats = corners.map(c => c.lat);
          const latR = Cesium.Math.toRadians(lats[0]);
          const w = (Math.max(...lons) - Math.min(...lons)) * 111320 * Math.cos(latR);
          const d = (Math.max(...lats) - Math.min(...lats)) * 111320;
          dims = `／概寸 約${w.toFixed(1)}×${d.toFixed(1)} m`;
        }
        ro.innerHTML = `点：<b>${corners.length}</b>／高さ：<b>${hgt}</b>${dims}`;
        document.getElementById("json").value = JSON.stringify({
          corners: corners.map(c => [ +c.lon.toFixed(7), +c.lat.toFixed(7) ]),
          baseZ: baseZ !== null ? +baseZ.toFixed(2) : null,
          roofZ: roofZ !== null ? +roofZ.toFixed(2) : null,
          height: (roofZ !== null && baseZ !== null) ? +(roofZ - baseZ).toFixed(2) : null
        }, null, 0);
      }

      document.getElementById("bBox").onclick = () => {
        if (corners.length < 3 || roofZ === null) {
          alert("輪郭を3点以上クリックし、高さも取得してください。");
          return;
        }
        if (boxEntity) viewer.entities.remove(boxEntity);
        boxEntity = viewer.entities.add({
          polygon: {
            hierarchy: new Cesium.PolygonHierarchy(
              corners.map(c => Cesium.Cartesian3.fromDegrees(c.lon, c.lat))),
            height: baseZ,
            extrudedHeight: roofZ,
            material: Cesium.Color.fromCssColorString("#2f7d4f").withAlpha(0.45),
            outline: true, outlineColor: Cesium.Color.WHITE
          }
        });
      };

      document.getElementById("bReset").onclick = () => {
        corners = []; baseZ = null; roofZ = null;
        cornerEnts.forEach(e => viewer.entities.remove(e));
        cornerEnts.length = 0;
        if (boxEntity) { viewer.entities.remove(boxEntity); boxEntity = null; }
        setMode(null); updateReadout();
      };

      function flyToStore() {
        const dN = -130 / 111320, latR = Cesium.Math.toRadians(STORE.lat);
        viewer.scene.camera.setView({
          destination: Cesium.Cartesian3.fromDegrees(STORE.lon, STORE.lat + dN, groundZ + 80),
          orientation: { heading: 0, pitch: Cesium.Math.toRadians(-25), roll: 0 }
        });
      }
      document.getElementById("bFly").onclick = flyToStore;
    }
  </script>
</body>
</html>
